<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Message Logs</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>

/* ---------- GLOBAL ---------- */
body {
    background: url("/static/Spam/Images/bgb.png") no-repeat center center fixed;
    background-size: cover;
    color: #e2e8f0;
    font-family: 'Segoe UI', sans-serif;
}

/* ---------- HEADER ---------- */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

/* ---------- CARD ---------- */
.card {
    background: rgba(30, 41, 59, 0.9);
    border-radius: 12px;
    border: none;
}

/* ---------- SEARCH ---------- */
.search-box {
    background: #020617;
    color: #f8fafc;
    border: 1px solid #475569;
}

.search-box::placeholder {
    color: #94a3b8;
}

/* ---------- FILTER BUTTONS ---------- */
.filter-btns button {
    margin-right: 5px;
}

/* ---------- LOG LIST ---------- */
.log-container {
    max-height: 400px;
    overflow-y: auto;
}

/* ---------- LOG ITEM ---------- */
.log-item {
    padding: 12px;
    border-bottom: 1px solid #334155;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.log-item span {
    color: #f8fafc;
    font-size: 14px;
}

.log-item:hover {
    background: #334155;
}

/* ---------- BADGES ---------- */
.badge-spam {
    background: #ef4444;
}

.badge-safe {
    background: #22c55e;
}
/* NAVBAR BASE */
.custom-navbar {
    background: linear-gradient(to right, #020617, #0f172a);
    border-bottom: 2px solid #1e293b;
    padding-top: 12px;
    padding-bottom: 12px;
}

/* LOGO BOX */
.logo-box {
    width: 45px;
    height: 45px;
    border-radius: 12px;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 20px;
    box-shadow: 0 0 12px rgba(59, 130, 246, 0.6);
}

/* NAV LINKS */
.nav-btn {
    color: #cbd5f5 !important;
    font-size: 14px;
    transition: 0.3s;
    padding: 6px 10px;
    border-radius: 8px;
}

.nav-btn:hover {
    background: #1e293b;
    color: #38bdf8 !important;
}

/* ACTIVE LOOK (optional if you want later) */
.nav-btn.active {
    background: linear-gradient(135deg, #2563eb, #4f46e5);
    color: white !important;
    box-shadow: 0 0 10px rgba(59, 130, 246, 0.6);
}

/* ICON SPACING */
.nav-btn i {
    margin-right: 5px;
}
</style>
</head>

<body>
<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg custom-navbar px-4">

    <!-- LEFT: LOGO + TITLE -->
    <div class="d-flex align-items-center">
        <div class="logo-box me-3">
            <i class="bi bi-graph-up-arrow"></i>
        </div>

        <div>
            <h5 class="mb-0 fw-bold text-white">AI Insights</h5>
            <small style="color: cyan;">Spam Detection Dashboard</small>
        </div>
    </div>

    <!-- TOGGLE (for mobile future) -->
    <button class="navbar-toggler text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
    </button>

    <!-- RIGHT SIDE -->
    <div class="collapse navbar-collapse justify-content-end" id="navMenu">

        <ul class="navbar-nav align-items-center gap-3">

    <li class="nav-item">
        <a href="/insights/" class="nav-link nav-btn 
        {% if request.path == '/insights/' %}active{% endif %}">
            <i class="bi bi-bar-chart-line"></i> Insights
        </a>
    </li>

    <li class="nav-item">
        <a href="/" class="nav-link nav-btn 
        {% if request.path == '/' %}active{% endif %}">
            <i class="bi bi-house"></i> Home
        </a>
    </li>

    <li class="nav-item">
        <a href="/output/" class="nav-link nav-btn 
        {% if request.path == '/output/' %}active{% endif %}">
            <i class="bi bi-list-ul"></i> Logs
        </a>
    </li>

    <li class="nav-item">
        <a href="/logout/" class="btn btn-danger btn-sm px-3">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>
    </li>

</ul>
    </div>
</nav>
<div class="container mt-4">

    <!-- HEADER -->
    <div class="header">
        <h4><i class="bi bi-journal-text"></i> Message Logs</h4>
        <a href="/" class="btn btn-outline-light btn-sm">Back</a>
    </div>

    <!-- SEARCH + FILTER -->
    <div class="card p-3 mb-3">

        <input type="text" id="searchInput"
               class="form-control search-box mb-3"
               placeholder="🔍 Search messages...">

        <div class="filter-btns">
            <button class="btn btn-light btn-sm" onclick="filterLogs('all')">All</button>
            <button class="btn btn-danger btn-sm" onclick="filterLogs('spam')">Spam</button>
            <button class="btn btn-success btn-sm" onclick="filterLogs('safe')">Safe</button>
        </div>

    </div>

    <!-- LOGS -->
    <div class="card p-3 log-container">

        {% for comment in all_comments %}
        <div class="log-item"
             data-type="{% if 'Spam' in comment.result %}spam{% else %}safe{% endif %}">

            <span>{{ comment.text }}</span>

            {% if "Spam" in comment.result %}
                <span class="badge badge-spam">SPAM</span>
            {% else %}
                <span class="badge badge-safe">SAFE</span>
            {% endif %}

        </div>
        {% empty %}
            <p class="text-muted">No logs available</p>
        {% endfor %}

    </div>

</div>

<!-- JS -->
<script>

function filterLogs(type) {
    let items = document.querySelectorAll(".log-item");

    items.forEach(function(item) {
        let itemType = item.getAttribute("data-type");

        if (type === "all") {
            item.style.display = "flex";
        } else if (itemType === type) {
            item.style.display = "flex";
        } else {
            item.style.display = "none";
        }
    });
}

// SEARCH
document.getElementById("searchInput").addEventListener("keyup", function() {
    let value = this.value.toLowerCase();
    let items = document.querySelectorAll(".log-item");

    items.forEach(function(item) {
        let text = item.innerText.toLowerCase();

        if (text.includes(value)) {
            item.style.display = "flex";
        } else {
            item.style.display = "none";
        }
    });
});

</script>

</body>
</html>
