<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Message Logs</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #0f172a;
    color: #e2e8f0;
}

.card {
    background: #1e293b;
    border-radius: 12px;
    border: none;
}

.log-item {
    padding: 12px;
    border-bottom: 1px solid #334155;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.log-item:hover {
    background: #334155;
}

.badge-spam {
    background: #ef4444;
    color: white;
}

.badge-safe {
    background: #22c55e;
    color: white;
}

.search-box {
    background: #020617;
    color: white;
    border: 1px solid #475569;
}
</style>
</head>

<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between mb-3">
        <h4>📜 Message Logs</h4>
        <a href="/" class="btn btn-outline-light btn-sm">Back</a>
    </div>

    <!-- SEARCH + FILTER -->
    <div class="card p-3 mb-3">
        <input type="text" id="searchInput" class="form-control search-box mb-2" placeholder="Search messages...">

        <div>
            <button class="btn btn-light btn-sm" onclick="filterLogs('all')">All</button>
            <button class="btn btn-danger btn-sm" onclick="filterLogs('spam')">Spam</button>
            <button class="btn btn-success btn-sm" onclick="filterLogs('safe')">Safe</button>
        </div>
    </div>

    <!-- LOGS -->
    <div class="card p-3">

        {% for comment in all_comments %}
        <div class="log-item"
             data-type="{% if 'Spam' in comment.result %}spam{% else %}safe{% endif %}">

            <span>{{ comment.text }}</span>

            {% if "Spam" in comment.result %}
                <span class="badge badge-spam">SPAM</span>
            {% else %}
                <span class="badge badge-safe">SAFE</span>
            {% endif %}

        </div>
        {% endfor %}

    </div>

</div>

<!-- ✅ WORKING JS -->
<script>

function filterLogs(type) {
    let items = document.querySelectorAll(".log-item");

    items.forEach(function(item) {
        let itemType = item.getAttribute("data-type");

        if (type === "all") {
            item.style.display = "flex";
        } 
        else if (itemType === type) {
            item.style.display = "flex";
        } 
        else {
            item.style.display = "none";
        }
    });
}

document.getElementById("searchInput").addEventListener("keyup", function() {
    let value = this.value.toLowerCase();
    let items = document.querySelectorAll(".log-item");

    items.forEach(function(item) {
        let text = item.innerText.toLowerCase();

        if (text.includes(value)) {
            item.style.display = "flex";
        } else {
            item.style.display = "none";
        }
    });
});

</script>

</body>
</html>
