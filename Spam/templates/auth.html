<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | AI Spam Detection</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>

/* ---------- BACKGROUND ---------- */
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #020617, #0f172a, #1e293b);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
}

/* ---------- CARD ---------- */
.auth-card {
    width: 500px;
    height: 500px;
    padding: 30px;
    border-radius: 16px;
    background: rgba(30, 41, 59, 0.7);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
    text-align: center;
    animation: fadeIn 0.6s ease;
}

/* ---------- TITLE ---------- */
.auth-title {
    font-size: 22px;
    font-weight: bold;
    color: #38bdf8;
    margin-bottom: 5px;
}

.auth-sub {
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 20px;
}

/* ---------- INPUT ---------- */
.input-group {
    margin-bottom: 15px;
}

.form-control {
    background: #020617 !important;
    border: 1px solid #334155 !important;
    color: #e2e8f0 !important;
}

.form-control::placeholder {
    color: #64748b;
}

.form-control:focus {
    border-color: #38bdf8 !important;
    box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
}

/* ---------- BUTTON ---------- */
.btn-login {
    width: 50%;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    border: none;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

.btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 12px rgba(59, 130, 246, 0.6);
}

/* ---------- ERROR ---------- */
.error-box {
    background: rgba(239, 68, 68, 0.1);
    color: #ef4444;
    padding: 8px;
    border-radius: 8px;
    font-size: 13px;
    width: 250px;
    text-align: center;
    margin-bottom: 10px;
}

/* ---------- ANIMATION ---------- */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

</style>
</head>

<body>

<div class="auth-card">

    <div class="mb-3">
        <i class="bi bi-shield-lock-fill text-info" style="font-size: 40px;"></i>
    </div>

    <div class="auth-title">Secure Login</div>
    <div class="auth-sub">AI Spam Detection System</div>
    <center>
    {% if error %}
        <div class="error-box">
            <i class="bi bi-exclamation-triangle"></i> {{ error }}
        </div>
    {% endif %}
    </center>

    <form method="POST" action="/">
        {% csrf_token %}

        <div class="input-group">
            <span class="input-group-text bg-dark border-0 text-light">
                <i class="bi bi-person"></i>
            </span>
            <input type="text" name="username" class="form-control" placeholder="Username" required>
        </div>

        <div class="input-group">
            <span class="input-group-text bg-dark border-0 text-light">
                <i class="bi bi-lock"></i>
            </span>
            <input type="password" name="password" class="form-control" placeholder="Password" required>
        </div>

        <button type="submit" class="btn btn-login mt-2">
            <i class="bi bi-box-arrow-in-right"></i> Login
        </button>

    </form>

</div>

</body>
</html>
